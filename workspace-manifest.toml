# ══════════════ TOOLS (тулинг + KB; нужны для восстановления воркспейса) ══════════════
# repo_url подтверждены фактом (git remote get-url origin, 2026-07-15).
# ⚠ check-release-drift.py читает только [cores]/[apps] — [tools] CI НЕ валидирует;
#   пины здесь поддерживаются вручную (bootstrap.sh их честно исполняет).

[tools.devtools]
package_name   = "devtools"
repo_url       = "git@github.com:andrei-shtanakov/devtools.git"
git_dir        = "devtools"
pyproject_path = "devtools/pyproject.toml"    # если нет pyproject — чекер деградирует до info
tag_pattern    = "v*"
tag            = "-"
sha            = "5327b364c95b"                # bump 2026-07-15: master после мержа devtools#8 (repos.sh install + Makefile)
install        = "git-sha"
publish        = "none"
rust           = false

[tools.ecosystem-kb]                           # = prograph-vault, дом командной координации
package_name   = "ecosystem-kb"
repo_url       = "git@github.com:andrei-shtanakov/prograph-vault.git"
git_dir        = "prograph-vault"
pyproject_path = "prograph-vault/pyproject.toml"   # KB без pyproject → чекер даст info, это ок
tag_pattern    = "v*"
tag            = "-"
sha            = "178ec33"                     # pinned 2026-07-15
install        = "git-sha"
publish        = "none"
rust           = false
