# workspace-manifest.toml — SSOT командного набора репо + пинов (schema v0.3)
#
# Дом: командный зонтик ai-orchestrators-workspace (НЕ devtools).
# Стартовая база: devtools/release-manifest.toml (snapshot 2026-07-12) + секция [tools].
# READ-ONLY по репо. Изменение = PR в зонтик (CODEOWNERS-аппрув).
#
# Отличие от release-manifest.toml:
#   * добавлена секция [tools.*] — devtools (установщик+чекеры) и ecosystem-kb
#     (дом координации). Без них команда не восстановит рабочий воркспейс.
#   * это ЕДИНСТВЕННЫЙ манифест набора; devtools-тулы читают его по --manifest.
#
# checkout_policy (как bootstrap.sh/repos.sh install выбирают ref):
#   sha если задан → иначе tag (если != "-") → иначе дефолтная ветка.
#   --head игнорирует пины и берёт дефолтную ветку (для активной разработки).

schema_version   = "0.3.0"
generated        = "2026-07-15"
ecosystem_release = "unreleased"

# ══════════════ ЯДРА (publish=pypi) ══════════════

[cores.spec-runner]
package_name   = "spec-runner"
repo_url       = "git@github.com:andrei-shtanakov/spec-runner.git"
git_dir        = "spec-runner"
pyproject_path = "spec-runner/pyproject.toml"
tag_pattern    = "v*"
tag            = "v2.9.0"
install        = "pypi"
lock_version   = "2.9.0"
pin_range      = ">=2.9,<3"
publish        = "pypi"
rust           = false

[cores.atp-platform-sdk]                 # workspace-member ВНУТРИ atp-platform
package_name   = "atp-platform-sdk"
member         = true                    # общий git_dir с atp-platform → НЕ клонится отдельно
repo_url       = "git@github.com:andrei-shtanakov/atp-platform.git"
git_dir        = "atp-platform"
pyproject_path = "atp-platform/packages/atp-sdk/pyproject.toml"
tag_pattern    = "atp-sdk-v*"
tag            = "atp-sdk-v2.0.0"
install        = "pypi"
lock_version   = "2.0.0"
pin_range      = ">=2.0,<3"
publish        = "pypi"
rust           = false

[cores.atp-platform]                     # umbrella-дистрибутив (тот же git_dir — не клонится дважды)
package_name   = "atp-platform"
repo_url       = "git@github.com:andrei-shtanakov/atp-platform.git"
git_dir        = "atp-platform"
pyproject_path = "atp-platform/pyproject.toml"
tag_pattern    = "v*"
tag            = "v2.1.0"
install        = "pypi"
lock_version   = "2.1.0"
pin_range      = ">=2.1,<3"
publish        = "pypi"
rust           = false

