# CANONICAL CALLER — copy this to each subproject's `.github/workflows/governance.yml`.
# ADR-ECO-004 D5. This is a THIN CALLER: a pinned reference to the reusable gate workflow at
# ai-orchestrators-workspace/.github/workflows/governance-gate.yml (checks under ci/governance/).
# No code is copied into consumers. The `governance-v1` tag is the pin, kept immutable by the
# umbrella's `governance-*` tag ruleset (retag/delete blocked), not by git tag semantics; the
# umbrella meta-enforcer verifies every repo references the canonical pin.
#
# Rollout per repo:
#   1. cp this file to .github/workflows/governance.yml
#   2. keep the `@governance-v1` pin (a protected, immutable tag; bump to governance-vN
#      for a new release — never point at a branch)
#   3. set authority-guard: true ONLY in repos holding authority-root paths
#      (ai-orchestrators-workspace, prograph-vault); KB/docs repos also set
#      runtime-scan: false + strict: false (guard advisory)
#   4. add "governance / gate" to the repo's branch ruleset as a required check (D4)
name: governance
permissions:
  contents: read          # gate only reads (2× checkout of public repos); least-privilege
on:
  pull_request:
  workflow_dispatch:

jobs:
  governance:
    uses: andrei-shtanakov/ai-orchestrators-workspace/.github/workflows/governance-gate.yml@governance-v1
    with:
      umbrella-ref: "governance-v1"   # same tag as the uses: pin above
      strict: true
      runtime-scan: true        # runtime code — GOV-003 applies
      authority-guard: false    # -> true only in umbrella / prograph-vault
